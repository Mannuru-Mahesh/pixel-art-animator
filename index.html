<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelForge — Pixel Art Animator</title>
<meta name="description" content="Frame-by-frame pixel art animator with GIF export.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="0" y="0" width="8" height="8" fill="#7c3aed"/>
          <rect x="10" y="0" width="8" height="8" fill="#7c3aed"/>
          <rect x="20" y="0" width="8" height="8" fill="#06b6d4"/>
          <rect x="0" y="10" width="8" height="8" fill="#06b6d4"/>
          <rect x="10" y="10" width="8" height="8" fill="#7c3aed"/>
          <rect x="20" y="10" width="8" height="8" fill="#7c3aed"/>
          <rect x="0" y="20" width="8" height="8" fill="#7c3aed"/>
          <rect x="10" y="20" width="8" height="8" fill="#06b6d4"/>
          <rect x="20" y="20" width="8" height="8" fill="#06b6d4"/>
        </svg>
        <span class="logo-text">PixelForge</span>
      </div>
      <div class="header-sep"></div>
      <div class="header-ctrl">
        <label>Canvas</label>
        <select id="canvas-size-sel">
          <option value="8">8×8</option>
          <option value="16">16×16</option>
          <option value="32" selected>32×32</option>
          <option value="64">64×64</option>
        </select>
      </div>
      <div class="header-ctrl">
        <label>Zoom</label>
        <button class="icon-btn" id="btn-zoom-out" title="Zoom Out (-)">−</button>
        <span id="zoom-label">14×</span>
        <button class="icon-btn" id="btn-zoom-in" title="Zoom In (+)">+</button>
      </div>
      <button class="icon-btn" id="btn-grid" title="Toggle Grid (G)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M0 0h7v7H0zm9 0h7v7H9zM0 9h7v7H0zm9 9h7v7H9z" opacity=".6"/>
        </svg>
        Grid
      </button>
      <button class="icon-btn" id="btn-onion" title="Toggle Onion Skin (O)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <circle cx="8" cy="8" r="3" fill="currentColor" opacity=".5"/>
        </svg>
        Onion
      </button>
    </div>
    <div class="header-center">
      <button class="icon-btn" id="btn-undo" title="Undo (Ctrl+Z)">↩ Undo</button>
      <button class="icon-btn" id="btn-redo" title="Redo (Ctrl+Y)">↪ Redo</button>
      <div class="header-sep"></div>
      <button class="play-btn" id="btn-play" title="Play/Pause (Space)">▶ Play</button>
      <div class="fps-ctrl">
        <label>FPS</label>
        <input type="range" id="fps-slider" min="1" max="24" value="8">
        <span id="fps-label">8</span>
      </div>
      <button class="icon-btn toggle-btn" id="btn-loop" title="Loop">⟳ Loop</button>
    </div>
    <div class="header-right">
      <button class="export-btn" id="btn-export-gif">Export GIF</button>
      <button class="export-btn secondary" id="btn-export-png">Export PNG</button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">

    <!-- TOOLS PANEL -->
    <aside class="tools-panel">
      <div class="tool-group">
        <button class="tool-btn active" data-tool="pencil" title="Pencil (B)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><path d="M6.5 17.5l4-4"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="fill" title="Fill Bucket (F)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 11l-8-8-8.5 8.5a5.5 5.5 0 0 0 7.78 7.78L19 11z"/><path d="M20 16.2A2.5 2.5 0 0 1 22.5 19a2.5 2.5 0 0 1-2.5 2.5 2.5 2.5 0 0 1-2.5-2.5c0-1 .5-2 2.5-4z"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 22l1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="line" title="Line (L)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="19" x2="19" y2="5"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
        </button>
      </div>
      <div class="tool-sep"></div>
      <div class="tool-group">
        <span class="tool-label">Size</span>
        <button class="size-btn active" data-size="1" title="1px">1</button>
        <button class="size-btn" data-size="2" title="2px">2</button>
        <button class="size-btn" data-size="3" title="3px">3</button>
        <button class="size-btn" data-size="4" title="4px">4</button>
      </div>
      <div class="tool-sep"></div>
      <div class="tool-group">
        <span class="tool-label">Mirror</span>
        <button class="icon-btn small toggle-btn" id="btn-mirror-x" title="Mirror Horizontal">↔ X</button>
        <button class="icon-btn small toggle-btn" id="btn-mirror-y" title="Mirror Vertical">↕ Y</button>
      </div>
    </aside>

    <!-- CANVAS WRAPPER -->
    <div class="canvas-wrapper">
      <div class="canvas-scroll">
        <div class="canvas-container" id="canvas-container">
          <canvas id="main-canvas"></canvas>
        </div>
      </div>
    </div>

    <!-- COLOR PANEL -->
    <aside class="color-panel">
      <div class="color-swatches-row">
        <div class="color-swatch-wrap">
          <div class="color-swatch secondary-swatch" id="swatch-secondary" title="Secondary Color"></div>
          <div class="color-swatch primary-swatch" id="swatch-primary" title="Primary Color"></div>
        </div>
        <button class="icon-btn small" id="btn-swap-colors" title="Swap Colors (X)">⇄</button>
      </div>
      <div class="color-inputs">
        <div class="color-input-row">
          <label>Primary</label>
          <input type="color" id="primary-color-input" value="#7c3aed">
        </div>
        <div class="color-input-row">
          <label>Secondary</label>
          <input type="color" id="secondary-color-input" value="#06b6d4">
        </div>
      </div>
      <div class="panel-section">
        <div class="section-header">
          <span>Palette</span>
          <select id="palette-select">
            <option value="pico8">PICO-8</option>
            <option value="gameboy">Game Boy</option>
            <option value="sweetie16">Sweetie 16</option>
            <option value="endesga32">ENDESGA 32</option>
          </select>
        </div>
        <div class="palette-grid" id="palette-grid"></div>
      </div>
      <div class="panel-section">
        <div class="section-header"><span>Recent Colors</span></div>
        <div class="recent-colors" id="recent-colors"></div>
      </div>
    </aside>

  </main>

  <!-- TIMELINE -->
  <footer class="timeline">
    <div class="timeline-controls">
      <button class="tl-btn" id="btn-add-frame" title="Add Frame">+ Frame</button>
      <button class="tl-btn" id="btn-dup-frame" title="Duplicate Frame">⧉ Dup</button>
      <button class="tl-btn danger" id="btn-del-frame" title="Delete Frame">✕ Del</button>
      <button class="tl-btn" id="btn-frame-left" title="Move Frame Left">← Move</button>
      <button class="tl-btn" id="btn-frame-right" title="Move Frame Right">→ Move</button>
    </div>
    <div class="frames-strip" id="frames-strip"></div>
  </footer>

</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-title" id="modal-title">Exporting GIF…</div>
    <div class="modal-body">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <p id="modal-status">Encoding frames…</p>
    </div>
    <button class="export-btn" id="modal-close" style="display:none">Close</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script src="app.js"></script>
</body>
</html>
